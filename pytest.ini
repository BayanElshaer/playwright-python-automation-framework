[pytest]
# ── Discovery ──────────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Default options ────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    --alluredir=reports/allure-results
    --clean-alluredir

# ── Markers ────────────────────────────────────────────────────────────────────
markers =
    smoke: Quick sanity check tests
    regression: Full regression suite
    security: Security-focused tests
    slow: Tests that take longer than average
    api: API automation tests

# ── Timeouts ──────────────────────────────────────────────────────────────────
timeout = 60

# ── Browser (pytest-playwright) ────────────────────────────────────────────────
# Override at CLI: --browser firefox --headed
